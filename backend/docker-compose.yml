services:
  db:
    image: postgres:15-alpine
    container_name: voxpop_db
    environment:
      POSTGRES_DB: voxpop_db
      POSTGRES_USER: voxpop
      POSTGRES_PASSWORD: voxpop_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voxpop -d voxpop_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: voxpop_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voxpop_web
    command: python manage.py runserver 0.0.0.0:8001
    volumes:
      - ./apps:/app/apps
      - ./config:/app/config
      - ./core:/app/core
      - media_data:/app/media
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voxpop_celery
    command: celery -A config worker -l INFO -Q default,campaigns,messages_high,messages_low,webhooks,analytics
    volumes:
      - ./apps:/app/apps
      - ./config:/app/config
      - ./core:/app/core
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voxpop_celery_beat
    command: celery -A config beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./apps:/app/apps
      - ./config:/app/config
      - ./core:/app/core
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development

volumes:
  postgres_data:
  redis_data:
  media_data:
